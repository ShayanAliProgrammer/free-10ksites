{{define "fragment_search"}}
<form
  hx-post="/track"
  hx-target="#track"
  hx-swap="innerHTML"
  hx-indicator="#track-spinner"
  class="w-full max-w-xl mx-auto animate-fade-up"
  aria-label="Track your website"
>
  <div class="flex flex-col sm:flex-row gap-3 p-2 bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-stone-200/80 ring-1 ring-emerald-500/5">
    <div class="relative flex-1">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 h-5 w-5 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input
        type="text"
        name="trackingId"
        placeholder="10K-ABC123"
        class="pl-11 h-12 w-full text-base sm:text-lg font-mono tracking-wider border-0 bg-transparent focus:outline-none placeholder:text-stone-400"
        aria-label="Tracking ID"
        autocomplete="off"
        spellcheck="false"
        value="{{.InitialQuery}}"
      >
    </div>
    <button type="submit" class="h-12 px-6 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl shadow-sm transition-colors inline-flex items-center justify-center gap-2">
      <svg id="track-spinner" class="htmx-indicator w-4 h-4 spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      <span>Track my site</span>
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
    </button>
  </div>
  <p class="mt-3 text-center text-xs text-stone-500">
    Try a demo ID:
    <button type="button" onclick="document.querySelector('input[name=trackingId]').value='10K-DEMO1'; this.form.dispatchEvent(new Event('submit', {cancelable:true, bubbles:true}))" class="font-mono font-medium text-emerald-700 hover:underline">10K-DEMO1</button>
    <span class="mx-1.5 text-stone-300">·</span>
    <button type="button" onclick="document.querySelector('input[name=trackingId]').value='10K-DEMO3'; this.form.dispatchEvent(new Event('submit', {cancelable:true, bubbles:true}))" class="font-mono font-medium text-emerald-700 hover:underline">10K-DEMO3</button>
    <span class="mx-1.5 text-stone-300">·</span>
    <button type="button" onclick="document.querySelector('input[name=trackingId]').value='10K-DEMO4'; this.form.dispatchEvent(new Event('submit', {cancelable:true, bubbles:true}))" class="font-mono font-medium text-emerald-700 hover:underline">10K-DEMO4</button>
  </p>
</form>
{{end}}
