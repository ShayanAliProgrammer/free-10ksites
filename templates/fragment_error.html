{{define "fragment_error"}}
<div class="w-full max-w-xl mx-auto bg-rose-50 border border-rose-200 rounded-2xl p-5 text-rose-800 text-sm animate-fade-up">
  <div class="flex items-start gap-3">
    <svg class="w-5 h-5 flex-shrink-0 mt-0.5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div class="flex-1">
      <p class="font-semibold text-sm mb-1">No site found</p>
      <p class="text-sm">{{.Error}}</p>
      <button
        hx-get="/reset"
        hx-target="#track"
        hx-swap="innerHTML"
        class="mt-3 inline-flex items-center gap-1 text-xs font-medium text-rose-700 hover:text-rose-900 hover:underline"
      >
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/></svg>
        Try another ID
      </button>
    </div>
  </div>
</div>
{{end}}
